services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: pan_app
    volumes:
      - .:/var/www
    environment:
      - APP_ENV=local
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - pan

  composer:
    image: composer:2
    container_name: pan_composer
    working_dir: /var/www
    volumes:
      - .:/var/www
    command: ["composer", "install", "--optimize-autoloader", "--no-interaction"]
    profiles:
      - tools

  nginx:
    image: nginx:1.27-alpine
    container_name: pan_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - pan

  mysql:
    image: mysql:8.4
    container_name: pan_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: pan
      MYSQL_USER: pan
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - pan_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - pan

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: pan_queue
    restart: on-failure
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600"]
    volumes:
      - .:/var/www
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - pan

networks:
  pan:
    driver: bridge

volumes:
  pan_mysql:
